# =============================================================================
# Backstage Demo — Build and push Docker image
#
# DEMO NOTE: This workflow illustrates the "traditional Backstage" CI cycle.
# Every change to ANY file (including a single plugin line) triggers this
# full pipeline, which typically takes 15–45 minutes end-to-end.
#
# Phase breakdown:
#   1. yarn install (deps)     ~5–10 min   ← all 1000+ packages re-evaluated
#   2. yarn build (compile)    ~5–20 min   ← TypeScript + webpack for entire app
#   3. docker build            ~3–10 min   ← assembles ~1 GB monolithic image
#   4. docker push             ~2–5 min    ← uploads ~1 GB to the registry
#
# Compare with the rhdh-plugins workflow (build-oci.sh):
#   rhdh-cli plugin package    ~1–2 min    ← only the changed plugin
#   docker push (~5 MB)        ~10–30 s
#   TOTAL:                     ~2–3 min
# =============================================================================

name: Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: quay.io
  IMAGE_NAME: quay.io/edubois10/backstage-demo

jobs:
  build-and-push:
    name: Build monolithic image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Phase 1: Install dependencies ──────────────────────────────────
      # This step downloads every npm package for the entire Backstage
      # monorepo, including dev tools. In a large Backstage app this means
      # hundreds of MB of packages and can take 5–10 minutes.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        # Even with cache hits, resolving and linking ~1000 packages takes time.
        # A cold cache (e.g. first run, or after yarn.lock changes) takes 5–10 min.
        # --mode skip-build avoids compiling native modules (better-sqlite3, etc.)
        # in CI — they are compiled inside the Docker build stage instead.
        run: yarn install --immutable --mode skip-build

      # ── Phase 2: Build TypeScript + frontend ───────────────────────────
      # TypeScript compiles every plugin and package in the monorepo.
      # Webpack bundles the entire React frontend into static assets.
      # This step alone can take 5–20 minutes for a full Backstage app.
      - name: Build backend
        run: yarn build:backend

      - name: Build frontend
        run: yarn workspace app build

      # ── Phase 3: Docker build ──────────────────────────────────────────
      # Multi-stage Docker build assembles the final ~800 MB – 1.5 GB image.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Phase 4: Push ~1 GB image ──────────────────────────────────────
      # Uploading a monolithic Backstage image to a container registry
      # takes 2–5 minutes even on a fast connection. The image contains
      # Node.js, all production npm packages, and the compiled app.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image pushed: \`${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Update the image tag in developer-hub-env to trigger ArgoCD sync." >> $GITHUB_STEP_SUMMARY
